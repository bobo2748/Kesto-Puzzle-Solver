<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesto 最佳解計算器 (極速查表版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #2c3e50; }
        
        /* 工具列設計 */
        .toolbar {
            margin: 20px auto;
            padding: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
        }
        .tool-label {
            margin: 0 10px;
            cursor: pointer;
            font-size: 1.1em;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .tool-label {
            background-color: #3498db;
            color: white;
            font-weight: bold;
        }

        /* 網格系統 */
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            grid-template-rows: repeat(8, 45px);
            gap: 2px;
            justify-content: center;
            margin: 20px auto;
            background-color: #34495e;
            padding: 5px;
            border-radius: 8px;
            width: fit-content;
            user-select: none; /* 防止拖曳時反白文字 */
        }
        .cell {
            background-color: #ecf0f1;
            width: 45px;
            height: 45px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 0.1s;
        }
        
        /* 視覺樣式 */
        .wall { background-color: #7f8c8d; }
        .target { border: 3px dashed #27ae60; background-color: #e8f8f5; }
        .block { background-color: #e67e22; border-radius: 10px; }
        .target.block { background-color: #f1c40f; border: 3px dashed #d35400; } /* 方塊放在目標上的樣子 */

        /* 按鈕與結果區 */
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        button:hover { background-color: #27ae60; transform: translateY(-2px); }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        
        #result {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>Kesto 最佳解計算器 🚀</h1>
    <p>選擇工具，在格子上點擊或<b>按住拖曳</b>來排版關卡！</p>

    <div class="toolbar">
        <input type="radio" name="tool" id="tool-wall" value="wall" checked>
        <label for="tool-wall" class="tool-label">🧱 牆壁</label>

        <input type="radio" name="tool" id="tool-target" value="target">
        <label for="tool-target" class="tool-label">🎯 目標</label>

        <input type="radio" name="tool" id="tool-block" value="block">
        <label for="tool-block" class="tool-label">🟦 方塊</label>

        <input type="radio" name="tool" id="tool-eraser" value="eraser">
        <label for="tool-eraser" class="tool-label">🧽 橡皮擦</label>
    </div>

    <div class="grid" id="grid"></div>

    <button id="solveBtn" onclick="startSolving()">🚀 計算最優解</button>
    <button onclick="clearBoard()" style="background-color: #e74c3c; margin-left: 10px;">🗑️ 清空盤面</button>

    <div id="result"></div>

    <script>
        const W = 8;
        const H = 8;
        let isMouseDown = false;
        
        // 狀態紀錄：以 1D 數字 (0~63) 紀錄
        let walls = new Set();
        let targets = new Set();
        let blocks = new Set();

        // 建立網格 UI
        const grid = document.getElementById('grid');
        for (let i = 0; i < W * H; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            
            // 實作滑鼠按住拖曳繪圖
            cell.addEventListener('mousedown', (e) => {
                isMouseDown = true;
                applyTool(i, cell);
            });
            cell.addEventListener('mouseenter', (e) => {
                if (isMouseDown) applyTool(i, cell);
            });
            
            grid.appendChild(cell);
        }

        document.addEventListener('mouseup', () => { isMouseDown = false; });

        // 套用工具邏輯
        function applyTool(index, cell) {
            const tool = document.querySelector('input[name="tool"]:checked').value;
            
            if (tool === 'eraser') {
                walls.delete(index);
                targets.delete(index);
                blocks.delete(index);
            } else if (tool === 'wall') {
                targets.delete(index); blocks.delete(index);
                walls.add(index);
            } else if (tool === 'target') {
                walls.delete(index);
                targets.add(index);
            } else if (tool === 'block') {
                walls.delete(index);
                blocks.add(index);
            }
            updateCellVisuals(index, cell);
        }

        // 更新畫面顯示
        function updateCellVisuals(index, cell) {
            cell.className = 'cell'; // 重置
            if (walls.has(index)) cell.classList.add('wall');
            if (targets.has(index)) cell.classList.add('target');
            if (blocks.has(index)) cell.classList.add('block');
        }

        // 清空盤面
        function clearBoard() {
            walls.clear(); targets.clear(); blocks.clear();
            document.querySelectorAll('.cell').forEach((cell, i) => updateCellVisuals(i, cell));
            document.getElementById('result').style.display = 'none';
        }

        // ==========================================
        // 核心演算法：翻譯自 Python 的階段三 (降維查表法)
        // ==========================================
        function solveKestoStage3() {
            if (blocks.size === 0 || targets.size === 0) return "請至少放置一個方塊與目標！";
            if (blocks.size !== targets.size) return `錯誤：方塊數量 (${blocks.size}) 與目標數量 (${targets.size}) 不一致！`;

            // 確保陣列由小到大排序 (JS預設是字串排序，必須加上 a-b)
            let startState = Array.from(blocks).sort((a, b) => a - b);
            let targetStr = Array.from(targets).sort((a, b) => a - b).join(',');

            if (startState.join(',') === targetStr) return "已經過關啦！步數：0 步";

            // 空間預處理：建立移動導航快取 (Lookup Table)
            const moveMaps = { 'Up': [], 'Down': [], 'Left': [], 'Right': [] };
            for (let p = 0; p < W * H; p++) {
                let r = Math.floor(p / W);
                let c = p % W;
                
                moveMaps['Up'][p] = (r > 0 && !walls.has(p - W)) ? p - W : p;
                moveMaps['Down'][p] = (r < H - 1 && !walls.has(p + W)) ? p + W : p;
                moveMaps['Left'][p] = (c > 0 && !walls.has(p - 1)) ? p - 1 : p;
                moveMaps['Right'][p] = (c < W - 1 && !walls.has(p + 1)) ? p + 1 : p;
            }

            // 單步移動邏輯
            function getNextState(state, dirName) {
                let newBlocks = [];
                let moveMap = moveMaps[dirName];
                
                // 往右、往下時，從陣列尾巴開始讀取 (模擬方塊排隊)
                let iterator = (dirName === 'Down' || dirName === 'Right') ? state.slice().reverse() : state;
                
                for (let p of iterator) {
                    let nxt = moveMap[p];
                    if (nxt !== p && !newBlocks.includes(nxt)) {
                        newBlocks.push(nxt);
                    } else {
                        newBlocks.push(p);
                    }
                }
                // 排列回原本順序確保 Hash 一致
                return newBlocks.sort((a, b) => a - b);
            }

            // JavaScript 版的極速 BFS Queue 實作 (利用 Index 指標避免陣列 shift 的延遲)
            let queue = [ { state: startState, pathNode: null } ];
            let head = 0; 
            let visited = new Set([startState.join(',')]);
            
            const dirs = ['Up', 'Down', 'Left', 'Right'];
            const dirNames = { 'Up': '上 ↑', 'Down': '下 ↓', 'Left': '左 ←', 'Right': '右 →' };

            let startTime = performance.now();

            while (head < queue.length) {
                let current = queue[head++];
                let currState = current.state;
                let pathNode = current.pathNode;

                // 找到解答，逆推路徑
                if (currState.join(',') === targetStr) {
                    let finalPath = [];
                    let currNode = pathNode;
                    while (currNode !== null) {
                        finalPath.push(dirNames[currNode.dir]);
                        currNode = currNode.prev;
                    }
                    let endTime = performance.now();
                    return { path: finalPath.reverse(), time: (endTime - startTime) };
                }

                for (let dir of dirs) {
                    let nextState = getNextState(currState, dir);
                    let nextStr = nextState.join(',');
                    
                    if (!visited.has(nextStr)) {
                        visited.add(nextStr);
                        // 把路徑像麵包屑一樣串起來
                        queue.push({ state: nextState, pathNode: { dir: dir, prev: pathNode } });
                    }
                }
            }
            return { error: "找不到解答 (無解)" };
        }

        // 點擊計算按鈕
        function startSolving() {
            const btn = document.getElementById('solveBtn');
            const resDiv = document.getElementById('result');
            
            btn.innerText = "⏳ 計算中...";
            btn.disabled = true;
            resDiv.style.display = 'none';

            // 使用 setTimeout 讓瀏覽器有時間更新「計算中...」的按鈕文字
            setTimeout(() => {
                let result = solveKestoStage3();
                
                resDiv.style.display = 'block';
                if (typeof result === 'string') {
                    resDiv.innerHTML = `⚠️ ${result}`;
                } else if (result.error) {
                    resDiv.innerHTML = `❌ ${result.error}`;
                } else {
                    resDiv.innerHTML = `
                        <div style="color: #27ae60; font-size: 1.4em; margin-bottom: 10px;">✅ 破解成功！最短步數為 ${result.path.length} 步</div>
                        <div style="font-size: 0.9em; color: #7f8c8d; margin-bottom: 15px;">⏱️ 運算耗時：${(result.time / 1000).toFixed(3)} 秒</div>
                        👉 <b>走法：</b><br><br>
                        ${result.path.join(' ➔ ')}
                    `;
                }
                
                btn.innerText = "🚀 計算最優解";
                btn.disabled = false;
            }, 50);
        }
    </script>
</body>
</html>
