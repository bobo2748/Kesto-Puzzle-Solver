<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesto 最佳解計算器 (Pro 暗黑版)</title>
    <style>
        /* 深色模式背景與字體 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #ffffff; }
        
        /* 工具列設計 (深色適應) */
        .toolbar {
            margin: 15px auto;
            padding: 15px;
            background: #2c2c2c;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: inline-block;
        }
        .tool-label {
            margin: 0 5px;
            cursor: pointer;
            font-size: 1.1em;
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.2s;
            color: #aaaaaa;
        }
        .tool-label:hover { background-color: #3a3a3a; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .tool-label {
            background-color: #555555;
            color: white;
            font-weight: bold;
        }

        /* 盤面大小選單 */
        .size-selector {
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        select {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
        }

        /* 網格系統 */
        .grid {
            display: grid;
            gap: 4px;
            justify-content: center;
            margin: 20px auto;
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 12px;
            width: fit-content;
            user-select: none; /* 防止拖曳時反白文字 */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        /* 🎨 根據截圖還原的完美配色 */
        .cell {
            background-color: #333333; /* 預設的深灰色格子 */
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.1s, border 0.1s;
            box-sizing: border-box; /* 確保加邊框時不會變大 */
        }
        
        .wall { background-color: #5a5a5a; } /* 淺灰色牆壁 */
        
        .block { 
            background-color: #f7a040; /* 經典 Kesto 橘色 */ 
            box-shadow: inset 0 0 5px rgba(255,255,255,0.2);
        }
        
        .target { 
            background-color: transparent; 
            border: 3px solid #3b82f6; /* 藍色目標邊框 */ 
        }
        
        .target.block { 
            /* 當方塊與目標重疊時：橘色方塊 + 藍色邊框 */
            background-color: #f7a040; 
            border: 3px solid #3b82f6; 
        }

        /* 按鈕與結果區 */
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
            margin: 5px;
        }
        button:hover { background-color: #27ae60; transform: translateY(-2px); }
        button:disabled { background-color: #555555; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        
        #result {
            margin-top: 20px;
            font-size: 1.1em;
            font-weight: bold;
            color: #f0f0f0;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            background: #2c2c2c;
            padding: 20px;
            border-radius: 10px;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        .step-success { color: #2ecc71; font-size: 1.3em; margin-bottom: 10px; }
        .step-time { color: #aaaaaa; font-size: 0.9em; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Kesto 最佳解計算器 🚀</h1>
    
    <div class="size-selector">
        <label for="gridSize">盤面大小：</label>
        <select id="gridSize" onchange="changeGridSize()">
            <option value="5">5 × 5</option>
            <option value="6">6 × 6</option>
            <option value="7">7 × 7</option>
            <option value="8" selected>8 × 8</option>
            <option value="9">9 × 9</option>
        </select>
    </div>

    <div class="toolbar">
        <input type="radio" name="tool" id="tool-wall" value="wall" checked>
        <label for="tool-wall" class="tool-label">🧱 牆壁</label>

        <input type="radio" name="tool" id="tool-target" value="target">
        <label for="tool-target" class="tool-label">🎯 目標</label>

        <input type="radio" name="tool" id="tool-block" value="block">
        <label for="tool-block" class="tool-label">🟧 方塊</label>

        <input type="radio" name="tool" id="tool-eraser" value="eraser">
        <label for="tool-eraser" class="tool-label">🧽 橡皮擦</label>
    </div>

    <div class="grid" id="grid"></div>

    <div>
        <button id="solveBtn" onclick="startSolving()">🚀 計算最優解</button>
        <button class="btn-danger" onclick="clearBoard()">🗑️ 清空盤面</button>
    </div>

    <div id="result"></div>

    <script>
        // 全域變數
        let W = 8;
        let H = 8;
        let isMouseDown = false;
        
        let walls = new Set();
        let targets = new Set();
        let blocks = new Set();

        // 初始化/切換盤面
        function changeGridSize() {
            const size = parseInt(document.getElementById('gridSize').value);
            W = size;
            H = size;
            
            walls.clear();
            targets.clear();
            blocks.clear();
            document.getElementById('result').style.display = 'none';
            
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${W}, 48px)`;
            grid.style.gridTemplateRows = `repeat(${H}, 48px)`;

            for (let i = 0; i < W * H; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                
                cell.addEventListener('mousedown', (e) => {
                    isMouseDown = true;
                    applyTool(i, cell);
                });
                cell.addEventListener('mouseenter', (e) => {
                    if (isMouseDown) applyTool(i, cell);
                });
                
                grid.appendChild(cell);
            }
        }

        // 偵測滑鼠放開
        document.addEventListener('mouseup', () => { isMouseDown = false; });

        // 套用工具邏輯
        function applyTool(index, cell) {
            const tool = document.querySelector('input[name="tool"]:checked').value;
            
            if (tool === 'eraser') {
                walls.delete(index);
                targets.delete(index);
                blocks.delete(index);
            } else if (tool === 'wall') {
                targets.delete(index); blocks.delete(index);
                walls.add(index);
            } else if (tool === 'target') {
                walls.delete(index);
                targets.add(index);
            } else if (tool === 'block') {
                walls.delete(index);
                blocks.add(index);
            }
            updateCellVisuals(index, cell);
        }

        // 更新畫面顯示 (還原 Kesto 色彩疊加邏輯)
        function updateCellVisuals(index, cell) {
            cell.className = 'cell'; // 重置為只有 .cell
            if (walls.has(index)) cell.classList.add('wall');
            if (targets.has(index)) cell.classList.add('target');
            if (blocks.has(index)) cell.classList.add('block');
        }

        // 清空按鈕
        function clearBoard() {
            walls.clear(); targets.clear(); blocks.clear();
            document.querySelectorAll('.cell').forEach((cell, i) => updateCellVisuals(i, cell));
            document.getElementById('result').style.display = 'none';
        }

        // 載入時先產生一次預設 8x8 盤面
        window.onload = changeGridSize;

        // ==========================================
        // 核心演算法：階段三 (降維查表法)
        // ==========================================
        function solveKestoStage3() {
            if (blocks.size === 0 || targets.size === 0) return "請至少放置一個方塊與目標！";
            if (blocks.size !== targets.size) return `錯誤：方塊數量 (${blocks.size}) 與目標數量 (${targets.size}) 不一致！`;

            let startState = Array.from(blocks).sort((a, b) => a - b);
            let targetStr = Array.from(targets).sort((a, b) => a - b).join(',');

            if (startState.join(',') === targetStr) return "已經過關啦！步數：0 步";

            const moveMaps = { 'Up': [], 'Down': [], 'Left': [], 'Right': [] };
            for (let p = 0; p < W * H; p++) {
                let r = Math.floor(p / W);
                let c = p % W;
                
                moveMaps['Up'][p] = (r > 0 && !walls.has(p - W)) ? p - W : p;
                moveMaps['Down'][p] = (r < H - 1 && !walls.has(p + W)) ? p + W : p;
                moveMaps['Left'][p] = (c > 0 && !walls.has(p - 1)) ? p - 1 : p;
                moveMaps['Right'][p] = (c < W - 1 && !walls.has(p + 1)) ? p + 1 : p;
            }

            function getNextState(state, dirName) {
                let newBlocks = [];
                let moveMap = moveMaps[dirName];
                let iterator = (dirName === 'Down' || dirName === 'Right') ? state.slice().reverse() : state;
                
                for (let p of iterator) {
                    let nxt = moveMap[p];
                    if (nxt !== p && !newBlocks.includes(nxt)) {
                        newBlocks.push(nxt);
                    } else {
                        newBlocks.push(p);
                    }
                }
                return newBlocks.sort((a, b) => a - b);
            }

            let queue = [ { state: startState, pathNode: null } ];
            let head = 0; 
            let visited = new Set([startState.join(',')]);
            
            const dirs = ['Up', 'Down', 'Left', 'Right'];
            const dirNames = { 'Up': '上 ↑', 'Down': '下 ↓', 'Left': '左 ←', 'Right': '右 →' };

            let startTime = performance.now();

            while (head < queue.length) {
                let current = queue[head++];
                let currState = current.state;
                let pathNode = current.pathNode;

                if (currState.join(',') === targetStr) {
                    let finalPath = [];
                    let currNode = pathNode;
                    while (currNode !== null) {
                        finalPath.push(dirNames[currNode.dir]);
                        currNode = currNode.prev;
                    }
                    let endTime = performance.now();
                    return { path: finalPath.reverse(), time: (endTime - startTime) };
                }

                for (let dir of dirs) {
                    let nextState = getNextState(currState, dir);
                    let nextStr = nextState.join(',');
                    
                    if (!visited.has(nextStr)) {
                        visited.add(nextStr);
                        queue.push({ state: nextState, pathNode: { dir: dir, prev: pathNode } });
                    }
                }
            }
            return { error: "找不到解答 (無解)" };
        }

        // 點擊計算按鈕
        function startSolving() {
            const btn = document.getElementById('solveBtn');
            const resDiv = document.getElementById('result');
            
            btn.innerText = "⏳ 計算中...";
            btn.disabled = true;
            resDiv.style.display = 'none';

            setTimeout(() => {
                let result = solveKestoStage3();
                
                resDiv.style.display = 'block';
                if (typeof result === 'string') {
                    resDiv.innerHTML = `⚠️ ${result}`;
                } else if (result.error) {
                    resDiv.innerHTML = `❌ ${result.error}`;
                } else {
                    resDiv.innerHTML = `
                        <div class="step-success">✅ 破解成功！最短步數為 ${result.path.length} 步</div>
                        <div class="step-time">⏱️ 運算耗時：${(result.time / 1000).toFixed(3)} 秒</div>
                        👉 <b>走法順序：</b><br><br>
                        ${result.path.join(' ➔ ')}
                    `;
                }
                
                btn.innerText = "🚀 計算最優解";
                btn.disabled = false;
            }, 50);
        }
    </script>
</body>
</html>
