<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesto 最佳解計算器 (背景多執行緒版)</title>
    <style>
        /* 深色模式背景與字體 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #ffffff; }
        
        /* 工具列設計 (深色適應) */
        .toolbar {
            margin: 15px auto;
            padding: 15px;
            background: #2c2c2c;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: inline-block;
        }
        .tool-label {
            margin: 0 5px;
            cursor: pointer;
            font-size: 1.1em;
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.2s;
            color: #aaaaaa;
        }
        .tool-label:hover { background-color: #3a3a3a; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .tool-label {
            background-color: #555555;
            color: white;
            font-weight: bold;
        }

        /* 盤面大小選單 */
        .size-selector {
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        select {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
        }

        /* 網格系統 */
        .grid {
            display: grid;
            gap: 4px;
            justify-content: center;
            margin: 20px auto;
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 12px;
            width: fit-content;
            user-select: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        .cell {
            background-color: #333333; 
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.1s, border 0.1s;
            box-sizing: border-box; 
        }
        
        .wall { background-color: #5a5a5a; } 
        .block { background-color: #f7a040; box-shadow: inset 0 0 5px rgba(255,255,255,0.2); }
        .target { background-color: transparent; border: 3px solid #3b82f6; }
        .target.block { background-color: #f7a040; border: 3px solid #3b82f6; }

        /* 按鈕與結果區 */
        button {
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
            margin: 5px;
        }
        
        .btn-start { background-color: #2ecc71; }
        .btn-start:hover { background-color: #27ae60; transform: translateY(-2px); }
        
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; transform: translateY(-2px); }
        
        .btn-stop { background-color: #f39c12; display: none; }
        .btn-stop:hover { background-color: #d68910; transform: translateY(-2px); }
        
        button:disabled { background-color: #555555; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }
        
        #result {
            margin-top: 20px;
            font-size: 1.1em;
            font-weight: bold;
            color: #f0f0f0;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            background: #2c2c2c;
            padding: 20px;
            border-radius: 10px;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #444;
            word-wrap: break-word;
        }
        .step-success { color: #2ecc71; font-size: 1.3em; margin-bottom: 10px; }
        .step-time { color: #aaaaaa; font-size: 0.9em; margin-bottom: 15px; }

        /* 加載動畫 */
        .loader {
            border: 4px solid #444;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>Kesto 最佳解計算器 🚀</h1>
    
    <div class="size-selector">
        <label for="gridSize">盤面大小：</label>
        <select id="gridSize" onchange="changeGridSize()">
            <option value="5">5 × 5</option>
            <option value="6">6 × 6</option>
            <option value="7">7 × 7</option>
            <option value="8" selected>8 × 8</option>
            <option value="9">9 × 9</option>
        </select>
    </div>

    <div class="toolbar">
        <input type="radio" name="tool" id="tool-wall" value="wall" checked>
        <label for="tool-wall" class="tool-label">🧱 牆壁</label>

        <input type="radio" name="tool" id="tool-target" value="target">
        <label for="tool-target" class="tool-label">🎯 目標</label>

        <input type="radio" name="tool" id="tool-block" value="block">
        <label for="tool-block" class="tool-label">🟧 方塊</label>

        <input type="radio" name="tool" id="tool-eraser" value="eraser">
        <label for="tool-eraser" class="tool-label">🧽 橡皮擦</label>
    </div>

    <div class="grid" id="grid"></div>

    <div>
        <button id="solveBtn" class="btn-start" onclick="startSolving()">🚀 計算最優解</button>
        <button id="stopBtn" class="btn-stop" onclick="stopSolving()">🛑 強制停止</button>
        <button id="clearBtn" class="btn-danger" onclick="clearBoard()">🗑️ 清空盤面</button>
    </div>

    <div id="result"></div>

    <script>
        let W = 8;
        let H = 8;
        let isMouseDown = false;
        let worker = null; // 用來存放背景 AI 執行緒
        
        let walls = new Set();
        let targets = new Set();
        let blocks = new Set();

        function changeGridSize() {
            const size = parseInt(document.getElementById('gridSize').value);
            W = size; H = size;
            walls.clear(); targets.clear(); blocks.clear();
            document.getElementById('result').style.display = 'none';
            
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${W}, 48px)`;
            grid.style.gridTemplateRows = `repeat(${H}, 48px)`;

            for (let i = 0; i < W * H; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                
                cell.addEventListener('mousedown', () => { isMouseDown = true; applyTool(i, cell); });
                cell.addEventListener('mouseenter', () => { if (isMouseDown) applyTool(i, cell); });
                grid.appendChild(cell);
            }
        }

        document.addEventListener('mouseup', () => { isMouseDown = false; });

        function applyTool(index, cell) {
            const tool = document.querySelector('input[name="tool"]:checked').value;
            if (tool === 'eraser') { walls.delete(index); targets.delete(index); blocks.delete(index); }
            else if (tool === 'wall') { targets.delete(index); blocks.delete(index); walls.add(index); }
            else if (tool === 'target') { walls.delete(index); targets.add(index); }
            else if (tool === 'block') { walls.delete(index); blocks.add(index); }
            updateCellVisuals(index, cell);
        }

        function updateCellVisuals(index, cell) {
            cell.className = 'cell';
            if (walls.has(index)) cell.classList.add('wall');
            if (targets.has(index)) cell.classList.add('target');
            if (blocks.has(index)) cell.classList.add('block');
        }

        function clearBoard() {
            stopSolving(); // 清空時如果有在算，也要停下來
            walls.clear(); targets.clear(); blocks.clear();
            document.querySelectorAll('.cell').forEach((cell, i) => updateCellVisuals(i, cell));
            document.getElementById('result').style.display = 'none';
        }

        window.onload = changeGridSize;

        // ==========================================
        // 背景執行緒 (Web Worker) 的核心邏輯
        // ==========================================
        // 為了不依賴外部檔案，我們把整個 AI 運算打包成 Blob 在背景執行
        function workerLogic() {
            self.onmessage = function(e) {
                const { W, H, wallsArr, targetsArr, blocksArr } = e.data;
                const walls = new Set(wallsArr);
                
                let startState = blocksArr.sort((a, b) => a - b);
                let targetStr = targetsArr.sort((a, b) => a - b).join(',');

                if (startState.join(',') === targetStr) {
                    self.postMessage({ path: [], time: 0 });
                    return;
                }

                // 建立導航快取
                const moveMaps = { 'Up': [], 'Down': [], 'Left': [], 'Right': [] };
                for (let p = 0; p < W * H; p++) {
                    let r = Math.floor(p / W);
                    let c = p % W;
                    moveMaps['Up'][p] = (r > 0 && !walls.has(p - W)) ? p - W : p;
                    moveMaps['Down'][p] = (r < H - 1 && !walls.has(p + W)) ? p + W : p;
                    moveMaps['Left'][p] = (c > 0 && !walls.has(p - 1)) ? p - 1 : p;
                    moveMaps['Right'][p] = (c < W - 1 && !walls.has(p + 1)) ? p + 1 : p;
                }

                function getNextState(state, dirName) {
                    let newBlocks = [];
                    let moveMap = moveMaps[dirName];
                    let iterator = (dirName === 'Down' || dirName === 'Right') ? state.slice().reverse() : state;
                    for (let p of iterator) {
                        let nxt = moveMap[p];
                        if (nxt !== p && !newBlocks.includes(nxt)) newBlocks.push(nxt);
                        else newBlocks.push(p);
                    }
                    return newBlocks.sort((a, b) => a - b);
                }

                let queue = [ { state: startState, pathNode: null } ];
                let head = 0; 
                let visited = new Set([startState.join(',')]);
                const dirs = ['Up', 'Down', 'Left', 'Right'];
                const dirNames = { 'Up': '上 ↑', 'Down': '下 ↓', 'Left': '左 ←', 'Right': '右 →' };

                let startTime = performance.now();
                // 🛑 記憶體保險絲：防止瀏覽器崩潰 (設定在 150 萬種狀態)
                const MAX_STATES = 1500000; 

                while (head < queue.length) {
                    // 保險絲檢查
                    if (visited.size > MAX_STATES) {
                        self.postMessage({ error: `記憶體超載保險絲啟動！已探索超過 ${MAX_STATES} 種可能狀態。此盤面過於龐大或複雜，請確認有無排錯！` });
                        return;
                    }

                    let current = queue[head++];
                    let currState = current.state;
                    let pathNode = current.pathNode;

                    if (currState.join(',') === targetStr) {
                        let finalPath = [];
                        let currNode = pathNode;
                        while (currNode !== null) {
                            finalPath.push(dirNames[currNode.dir]);
                            currNode = currNode.prev;
                        }
                        let endTime = performance.now();
                        self.postMessage({ path: finalPath.reverse(), time: (endTime - startTime) });
                        return;
                    }

                    for (let dir of dirs) {
                        let nextState = getNextState(currState, dir);
                        let nextStr = nextState.join(',');
                        
                        if (!visited.has(nextStr)) {
                            visited.add(nextStr);
                            queue.push({ state: nextState, pathNode: { dir: dir, prev: pathNode } });
                        }
                    }
                }
                self.postMessage({ error: "探索完所有可能性，找不到解答 (無解)" });
            };
        }

        // ==========================================
        // 按鈕控制與背景通訊邏輯
        // ==========================================
        function toggleUI(isComputing) {
            document.getElementById('solveBtn').style.display = isComputing ? 'none' : 'inline-block';
            document.getElementById('stopBtn').style.display = isComputing ? 'inline-block' : 'none';
            document.getElementById('clearBtn').disabled = isComputing;
            document.getElementById('gridSize').disabled = isComputing;
        }

        function stopSolving() {
            if (worker) {
                worker.terminate(); // 殺掉背景執行緒
                worker = null;
                toggleUI(false);
                const resDiv = document.getElementById('result');
                resDiv.style.display = 'block';
                resDiv.innerHTML = `⚠️ <b>已手動終止計算！</b>`;
            }
        }

        function startSolving() {
            if (blocks.size === 0 || targets.size === 0) {
                alert("請至少放置一個方塊與目標！"); return;
            }
            if (blocks.size !== targets.size) {
                alert(`錯誤：方塊數量 (${blocks.size}) 與目標數量 (${targets.size}) 不一致！`); return;
            }

            const resDiv = document.getElementById('result');
            resDiv.style.display = 'block';
            resDiv.innerHTML = `<span class="loader"></span> 正在背景拼命計算中...網頁不會卡住，請安心等待！`;
            
            toggleUI(true); // 切換到「計算中」的 UI

            // 將 Worker 邏輯轉換為 URL
            const blob = new Blob(["(" + workerLogic.toString() + ")()"], { type: "application/javascript" });
            const workerUrl = URL.createObjectURL(blob);
            
            // 啟動 Worker
            worker = new Worker(workerUrl);
            
            // 將現在的盤面資料丟進背景運算
            worker.postMessage({
                W: W, H: H,
                wallsArr: Array.from(walls),
                targetsArr: Array.from(targets),
                blocksArr: Array.from(blocks)
            });

            // 接收背景算完的回傳結果
            worker.onmessage = function(e) {
                let result = e.data;
                toggleUI(false);
                
                if (result.error) {
                    resDiv.innerHTML = `❌ ${result.error}`;
                } else {
                    resDiv.innerHTML = `
                        <div class="step-success">✅ 破解成功！最短步數為 ${result.path.length} 步</div>
                        <div class="step-time">⏱️ 運算耗時：${(result.time / 1000).toFixed(3)} 秒</div>
                        👉 <b>走法順序：</b><br><br>
                        ${result.path.length > 0 ? result.path.join(' ➔ ') : '不用動，已經過關了！'}
                    `;
                }
                
                worker.terminate(); // 用完即丟，釋放資源
                worker = null;
            };
        }
    </script>
</body>
</html>
